services:
  db:
    image: mysql:8.0
    container_name: ccpm-db
    restart: always
    environment:
      MYSQL_DATABASE: course_registration_db
      MYSQL_USER: course_user
      MYSQL_PASSWORD: course_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ccpm_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ccpm-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/course_registration_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: course_user
      SPRING_DATASOURCE_PASSWORD: course_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    networks:
      - ccpm_network

volumes:
  mysql_data:

networks:
  ccpm_network:
    driver: bridge
